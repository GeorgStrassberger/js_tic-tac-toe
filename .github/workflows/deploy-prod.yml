name: Deploy Production
run-name: ${{ github.actor }} is deploying to production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install --yes lftp

      - name: Upload dist via SFTP
        env:
          SFTP_HOST: ${{ secrets.STRATO_SFTP_HOST }}
          SFTP_USER: ${{ secrets.STRATO_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.STRATO_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.STRATO_SFTP_PORT }}
          SFTP_PATH: ${{ secrets.STRATO_SFTP_PATH }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose dist/ "$SFTP_PATH"
          bye
          EOF

      - name: Verify deployed site
        run: curl --fail --silent --show-error https://tictactoe.georg-strassberger.de/ | grep -q 'id="app"'
