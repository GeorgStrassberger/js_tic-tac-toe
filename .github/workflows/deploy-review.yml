name: Deploy Review
run-name: ${{ github.actor }} is deploying to review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: deploy-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-review:
    name: Deploy review build
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install --yes lftp

      - name: Upload dist via SFTP
        env:
          SFTP_HOST: ${{ secrets.STRATO_SFTP_HOST }}
          SFTP_USER: ${{ secrets.STRATO_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.STRATO_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.STRATO_SFTP_PORT }}
          REVIEW_PATH: ./cicd/review/
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose dist/ "$REVIEW_PATH"
          bye
          EOF

      - name: Verify deployed site
        run: curl --fail --silent --show-error https://review.georg-strassberger.de/ | grep -q 'id="app"'
