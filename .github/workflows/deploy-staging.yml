name: Deploy Staging
run-name: staging deploy for ${{ github.event.workflow_run.head_branch }}

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to staging
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout merged main branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install --yes lftp

      - name: Upload dist via SFTP
        env:
          SFTP_HOST: ${{ secrets.STRATO_SFTP_HOST }}
          SFTP_USER: ${{ secrets.STRATO_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.STRATO_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.STRATO_SFTP_PORT }}
          SFTP_PATH: ${{ secrets.STRATO_SFTP_PATH }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose dist/ "$SFTP_PATH"
          bye
          EOF

      - name: Verify deployed site
        run: curl --fail --silent --show-error https://staging.georg-strassberger.de/ | grep -q 'id="app"'
